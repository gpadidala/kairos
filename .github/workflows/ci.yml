name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type check (mypy --strict)
        run: uv run mypy src/pcap

      - name: Unit + integration tests
        run: uv run pytest -q

      - name: Coverage gate
        run: uv run pytest --cov --cov-fail-under=80 -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: bandit
        run: |
          uv tool run --from bandit bandit -r src/pcap -x tests -ll

      - name: pip-audit
        run: |
          uv tool run --from pip-audit pip-audit --strict || true

  docker:
    runs-on: ubuntu-latest
    needs: [lint-type-test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t pcap:ci .

      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: pcap:ci
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.16.0 }
      - name: helm lint
        run: helm lint deploy/helm/pcap || true
      - name: helm template
        run: helm template pcap deploy/helm/pcap > /tmp/rendered.yaml || true
      - name: kubeconform
        run: |
          curl -sSL -o /tmp/kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /tmp
          /tmp/kubeconform -summary -strict -kubernetes-version 1.30.0 /tmp/rendered.yaml || true
