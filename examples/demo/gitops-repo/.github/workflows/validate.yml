name: Validate PCAP PR

on:
  pull_request:
    paths:
      - "apps/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kc.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Kubeconform
        run: |
          find apps -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 \
            | xargs -0 kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/cf.tgz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar -xzf /tmp/cf.tgz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/

      - name: Conftest policy check
        run: |
          if [ -d policies ]; then
            conftest test apps/ --policy policies/
          else
            echo "no policies directory — skipping"
          fi

      - name: PCAP PR invariants
        if: contains(github.event.pull_request.labels.*.name, 'pcap')
        run: |
          [[ "${{ github.event.pull_request.head.ref }}" == pcap/* ]] || {
            echo "::error::PCAP PR branch must start with 'pcap/'"; exit 1; }
          [[ "${{ github.event.pull_request.title }}" == \[PCAP\]* ]] || {
            echo "::error::PCAP PR title must start with '[PCAP]'"; exit 1; }
