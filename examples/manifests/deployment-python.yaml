apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: prod
  labels:
    app.kubernetes.io/name: inference-api
    app.kubernetes.io/runtime: python
  annotations:
    kairos.io/gitops-path: "apps/inference-api"
    kairos.io/runtime: "python"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: inference-api
          image: python:3.12-slim
          command: ["uvicorn", "app:api", "--host=0.0.0.0", "--port=8000", "--workers=2"]
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
