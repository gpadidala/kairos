apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-svc
  namespace: prod
  labels:
    app.kubernetes.io/name: billing-svc
    app.kubernetes.io/runtime: dotnet
  annotations:
    pcap.io/gitops-path: "apps/billing-svc"
    pcap.io/runtime: "dotnet"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
    spec:
      containers:
        - name: billing-svc
          image: mcr.microsoft.com/dotnet/aspnet:9.0
          ports:
            - name: http
              containerPort: 80
          env:
            - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
              value: "true"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
