apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: prod
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/runtime: jvm
  annotations:
    pcap.io/gitops-path: "apps/payments-api"
    pcap.io/runtime: "jvm"
    pcap.io/keda-scaledobject: "payments-api-scaler"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: payments-api
          image: eclipse-temurin:21-jre
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseZGC -XX:MaxRAMPercentage=70"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
