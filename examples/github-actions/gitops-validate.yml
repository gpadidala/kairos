name: Validate KAIROS-generated PRs

# Drop this workflow into your GitOps repo. It runs on every PR — including
# ones KAIROS opens (identified by the `kairos` label).

on:
  pull_request:
    paths:
      - "apps/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kc.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Kubeconform — strict, k8s 1.30
        run: |
          find apps -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 \
            | xargs -0 kubeconform -strict -summary -kubernetes-version 1.30.0

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tgz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar -xzf /tmp/conftest.tgz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/

      - name: Conftest policy check
        run: |
          if [ -d policies ]; then
            conftest test apps/ --policy policies/
          else
            echo "No policies/ directory; skipping."
          fi

      - name: KAIROS PR invariants
        if: contains(github.event.pull_request.labels.*.name, 'kairos')
        run: |
          # KAIROS-opened PRs must satisfy: branch pattern, title prefix, labels.
          if [[ "${{ github.event.pull_request.head.ref }}" != kairos/* ]]; then
            echo "::error::KAIROS PR branch must start with 'kairos/'"
            exit 1
          fi
          if [[ "${{ github.event.pull_request.title }}" != \[KAIROS\]* ]]; then
            echo "::error::KAIROS PR title must start with '[KAIROS]'"
            exit 1
          fi
