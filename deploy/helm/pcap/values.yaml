# PCAP Helm values — documented defaults.
# Override via `--set` or a -values file. Never inline secrets here.

replicaCount: 2

image:
  repository: ghcr.io/your-org/pcap
  tag: "" # default: appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Required read-only RBAC on workload kinds + ScaledObjects.
rbac:
  create: true

# PCAP configuration — becomes a ConfigMap and env vars on the Deployment.
config:
  environment: prod
  mimir:
    url: "http://mimir-query-frontend.monitoring.svc:8080"
    orgId: ""          # X-Scope-OrgID for multi-tenant Mimir
    timeoutSeconds: 30
    maxConcurrent: 4
  grafana:
    url: "http://grafana.monitoring.svc:3000"
    folder: PCAP
    datasourceMimir: Mimir
    provisionDashboards: true
    provisionAlerts: true
  github:
    repo: ""           # e.g. "acme/gitops" — empty disables PR creation
    baseBranch: main
    branchPrefix: pcap
    reviewers: []
    labels: ["pcap", "autoscaling"]
  llm:
    primary: anthropic
    fallbackOrder: ["openai", "azure_openai", "ollama"]
  redis:
    url: "redis://redis-master.pcap.svc:6379/0"
  postgres:
    enabled: false
    dsn: ""
  teams:
    webhookUrl: ""     # populated from secret
  slack:
    channel: ""
  smtp:
    host: ""
    port: 587
    fromAddr: "pcap@example.com"
    toAddrs: []
  k8s:
    mode: "in_cluster"
    namespaces: []
  scheduler:
    enabled: true
    intervalMinutes: 30
    jitterSeconds: 30
    maxConcurrentWorkloads: 4
  forecasting:
    horizonHours: 48
    lookbackDays: 14
    resolutionSeconds: 300
    minConfidence: 0.4
  decision:
    cpuHeadroomThreshold: 0.8
    memHeadroomThreshold: 0.8
    lowUtilizationThreshold: 0.3
    maxStepReplicas: 2
    minReplicasFloor: 1
  features:
    enableLlm: true
    enablePrCreation: true
    enableNotifications: true
    enableGrafanaProvisioning: true
    dryRun: false
    allowStatefulsetAutoPr: false
  api:
    host: "0.0.0.0"
    port: 8080
  tracing:
    enabled: true
    otlpEndpoint: "http://otel-collector.monitoring.svc:4317"
    sampleRatio: 0.1
  logging:
    level: INFO

# Secrets are referenced by name. Populate them via CSI / ExternalSecret.
existingSecrets:
  github: ""          # key: token
  llm: ""             # keys: anthropic-api-key, openai-api-key, azure-openai-api-key
  grafana: ""         # key: api-token
  redis: ""           # key: url (optional if URL has no password)
  teams: ""           # key: webhook-url
  slack: ""           # keys: webhook-url, bot-token
  smtp: ""            # keys: username, password
  apiTokens: ""       # key: sha256-list — comma-separated

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 2Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true
  egress:
    # Mimir, Grafana, Redis, Postgres, LLM providers, Teams/Slack webhooks, SMTP.
    # Override with concrete CIDRs / fqdnSelectors for your cluster.
    allowAll: false
    extraEgress: []

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["pcap"]
          topologyKey: kubernetes.io/hostname

podAnnotations: {}
podLabels: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
