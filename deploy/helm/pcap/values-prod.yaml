# Production overrides on top of values.yaml.
replicaCount: 3

image:
  pullPolicy: IfNotPresent

config:
  features:
    dryRun: false
    enablePrCreation: true
  scheduler:
    intervalMinutes: 30
  logging:
    level: INFO

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4
    memory: 4Gi

existingSecrets:
  github: pcap-github
  llm: pcap-llm
  grafana: pcap-grafana
  redis: pcap-redis
  teams: pcap-teams
  slack: pcap-slack
  smtp: pcap-smtp
  apiTokens: pcap-api

hpa:
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65
