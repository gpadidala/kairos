{{/*
No inline secrets — KAIROS reads from Secrets referenced in `existingSecrets`.
Populate those Secrets with CSI Secret Store / ExternalSecret / SealedSecret.

Example (don't commit this to the GitOps repo):

apiVersion: v1
kind: Secret
metadata:
  name: kairos-github
  namespace: kairos
type: Opaque
stringData:
  token: ghp_REDACTED
---
apiVersion: v1
kind: Secret
metadata:
  name: kairos-llm
  namespace: kairos
type: Opaque
stringData:
  anthropic-api-key: sk-ant-REDACTED
  openai-api-key: sk-REDACTED
---
See docs/installation.md for the canonical bootstrap.
*/}}
