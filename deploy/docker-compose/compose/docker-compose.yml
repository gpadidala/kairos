# KAIROS — production-grade standalone Docker Compose stack.
#
# One-liner (from the deploy/docker-compose/ directory):
#
#   docker compose --env-file .env -f compose/docker-compose.yml -p kairos up -d
#
# Profiles:
#   (default)  — KAIROS + Redis + Mimir + Grafana
#   demo       — adds the synthetic metric feeder
#
# See README.md for verify steps + corporate-env overrides.

services:
  redis:
    image: redis:${REDIS_TAG:-7.4-alpine}
    container_name: kairos-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-512m}
    networks: [kairos-net]

  mimir:
    image: grafana/mimir:${MIMIR_TAG:-2.13.0}
    container_name: kairos-mimir
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    environment:
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    volumes:
      - ../config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    ports:
      - "${MIMIR_PORT:-9009}:9009"
    # grafana/mimir is distroless-static — no wget/curl/sh available — so we
    # can't run an in-container healthcheck. Dependents use service_started
    # and retry via their own clients (KAIROS has a circuit breaker, Grafana
    # retries datasource connectivity).
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MIMIR_MEM_LIMIT:-2g}
    networks: [kairos-net]

  grafana:
    image: grafana/grafana:${GRAFANA_TAG:-11.4.0}
    container_name: kairos-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_ANONYMOUS_ROLE:-Viewer}
      GF_FEATURE_TOGGLES_ENABLE: "provisioning,alertingSimplifiedRouting"
      GF_INSTALL_PLUGINS: ""
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    volumes:
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      mimir:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-1g}
    networks: [kairos-net]

  kairos:
    image: ${KAIROS_IMAGE:-ghcr.io/your-org/kairos}:${KAIROS_IMAGE_TAG:-0.1.0}
    container_name: kairos
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
    environment:
      # ── Core ─────────────────────────────────────────────────────
      KAIROS_ENVIRONMENT: ${KAIROS_ENVIRONMENT:-prod}
      KAIROS_LOGGING__LEVEL: ${KAIROS_LOG_LEVEL:-INFO}
      KAIROS_LOGGING__JSON_FORMAT: "true"
      # ── API ──────────────────────────────────────────────────────
      KAIROS_API__PORT: "8080"
      KAIROS_API__TOKEN_SHA256_LIST: ${KAIROS_API_TOKEN_SHA256_LIST:-}
      # External URL Grafana + GitHub reach Kairos at — used to build the
      # webhook URL Kairos auto-provisions in Grafana's contact points.
      KAIROS_API__EXTERNAL_URL: ${KAIROS_API_EXTERNAL_URL:-http://kairos:8080}
      # ── Feature toggles ──────────────────────────────────────────
      KAIROS_FEATURES__ENABLE_UI: ${KAIROS_FEATURES_ENABLE_UI:-true}
      KAIROS_FEATURES__REQUIRE_UI_APPROVAL: ${KAIROS_FEATURES_REQUIRE_UI_APPROVAL:-true}
      KAIROS_FEATURES__ENABLE_LLM: ${KAIROS_FEATURES_ENABLE_LLM:-false}
      KAIROS_FEATURES__ENABLE_NOTIFICATIONS: ${KAIROS_FEATURES_ENABLE_NOTIFICATIONS:-false}
      KAIROS_FEATURES__ENABLE_PR_CREATION: ${KAIROS_FEATURES_ENABLE_PR_CREATION:-false}
      KAIROS_FEATURES__ENABLE_GRAFANA_PROVISIONING: "true"
      KAIROS_FEATURES__DRY_RUN: ${KAIROS_FEATURES_DRY_RUN:-true}
      # ── Scheduler ────────────────────────────────────────────────
      KAIROS_SCHEDULER__ENABLED: ${KAIROS_SCHEDULER_ENABLED:-true}
      KAIROS_SCHEDULER__INTERVAL_MINUTES: ${KAIROS_SCHEDULER_INTERVAL_MINUTES:-30}
      # ── Forecasting ──────────────────────────────────────────────
      KAIROS_FORECASTING__HORIZON_HOURS: ${KAIROS_FORECASTING_HORIZON_HOURS:-48}
      KAIROS_FORECASTING__LOOKBACK_DAYS: ${KAIROS_FORECASTING_LOOKBACK_DAYS:-1}
      KAIROS_FORECASTING__RESOLUTION_SECONDS: ${KAIROS_FORECASTING_RESOLUTION_SECONDS:-60}
      KAIROS_FORECASTING__USE_PROPHET_IF_AVAILABLE: ${KAIROS_FORECASTING_USE_PROPHET_IF_AVAILABLE:-false}
      # ── Mimir ────────────────────────────────────────────────────
      KAIROS_MIMIR__URL: ${KAIROS_MIMIR_URL:-http://mimir:9009}
      KAIROS_MIMIR__ORG_ID: ${KAIROS_MIMIR_ORG_ID:-}
      # ── Grafana ──────────────────────────────────────────────────
      # URL = server-side (api calls); EXTERNAL_URL = browser-facing links.
      KAIROS_GRAFANA__URL: ${KAIROS_GRAFANA_URL:-http://grafana:3000}
      KAIROS_GRAFANA__EXTERNAL_URL: ${KAIROS_GRAFANA_EXTERNAL_URL:-http://localhost:3000}
      # ── Redis ────────────────────────────────────────────────────
      KAIROS_REDIS__URL: "redis://redis:6379/0"
      # ── Discovery (static) ───────────────────────────────────────
      KAIROS_K8S__MODE: "static"
      KAIROS_K8S__STATIC_WORKLOADS_FILE: "/config/kairos-workloads.yaml"
      # ── SQLite audit DB (in-volume) ──────────────────────────────
      KAIROS_AUDIT_DB__URL: "sqlite+aiosqlite:////data/kairos-audit.db"
      # ── GitHub ───────────────────────────────────────────────────
      KAIROS_GITHUB__REPO: ${KAIROS_GITHUB_REPO:-}
      KAIROS_GITHUB__BASE_BRANCH: ${KAIROS_GITHUB_BASE_BRANCH:-main}
      # ── LLM ──────────────────────────────────────────────────────
      KAIROS_LLM__PRIMARY: ${KAIROS_LLM_PRIMARY:-anthropic}
      # ── Tracing off by default for corp (set OTel endpoint to enable) ─
      KAIROS_TRACING__ENABLED: "false"
      # ── Corporate proxy ──────────────────────────────────────────
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    env_file:
      # Optional — lets operators inject secrets without committing .env
      - path: .secrets.env
        required: false
    volumes:
      - ../config/kairos/kairos-workloads.yaml:/config/kairos-workloads.yaml:ro
      - kairos-data:/data
      # Optional secrets directory (each file's contents becomes an env var via entrypoint hook below)
      - ../.secrets:/run/kairos-secrets:ro
    ports:
      - "${KAIROS_API_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      mimir:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${KAIROS_MEM_LIMIT:-2g}
          cpus: "${KAIROS_CPU_LIMIT:-2}"
    networks: [kairos-net]

  # ── Optional: synthetic-metrics feeder (enable with `--profile demo`) ──
  seed:
    image: python:3.12-slim
    container_name: kairos-seed
    profiles: ["demo"]
    working_dir: /seed
    volumes:
      - ../config/seed:/seed:ro
    command:
      - "bash"
      - "-c"
      - "pip install --quiet cramjam && python -u feeder.py"
    environment:
      MIMIR_URL: "http://mimir:9009"
      SEED_INTERVAL_SECONDS: "15"
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    depends_on:
      mimir:
        condition: service_started
    restart: unless-stopped
    networks: [kairos-net]

volumes:
  redis-data: {}
  mimir-data: {}
  grafana-data: {}
  kairos-data: {}

networks:
  kairos-net:
    driver: bridge
